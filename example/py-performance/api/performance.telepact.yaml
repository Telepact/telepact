- struct.BenchmarkSummary:
    recordCount: "integer"
    scalarCount: "integer"
    approxCharacters: "integer"
    hint: "string"
- struct.Address:
    name: "string"
    street: "string"
    city: "string"
    region: "string"
    postalCode: "string"
    country: "string"
- struct.TypicalItem:
    sku: "string"
    quantity: "integer"
    priceCents: "integer"
    fragile: "boolean"
    warehouse: "string"
    tags: ["string"]
- struct.TypicalShipment:
    shipmentId: "string"
    customerId: "string"
    priority: "string"
    address: "struct.Address"
    items: ["struct.TypicalItem"]
    note: "string"
    etaDays: "integer"
    riskScore: "number"
- struct.StringRow:
    id: "string"
    group: "string"
    locale: "string"
    title: "string"
    summary: "string"
    body: "string"
    tag: "string"
    slug: "string"
- struct.NumberRow:
    id: "integer"
    metricA: "number"
    metricB: "number"
    metricC: "number"
    metricD: "number"
    metricE: "number"
    metricF: "number"
    metricG: "number"
- union.Payload_:
    - Typical:
        shipments: ["struct.TypicalShipment"]
        eventNotes: ["string"]
        flags: {"string": "boolean"}
    - StringHeavy:
        rows: ["struct.StringRow"]
        locales: ["string"]
        category: "string"
    - NumberHeavy:
        rows: ["struct.NumberRow"]
        totals: {"string": "number"}
        sampleRateHz: "integer"
- fn.getBenchmarkPayload:
    profile: "string"
    size: "string"
  ->:
    - Ok_:
        profile: "string"
        size: "string"
        summary: "struct.BenchmarkSummary"
        payload: "union.Payload_"
        checksum: "string"
