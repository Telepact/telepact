- struct.PerformanceSummary:
    profile: "string"
    itemCount: "integer"
    tagCount: "integer"
    revisionCount: "integer"
- struct.WarehouseSnapshot:
    region: "string"
    aisle: "string"
    bin: "string"
- struct.AnalyticsSnapshot:
    views: "integer"
    purchases: "integer"
    returns: "integer"
- struct.RevisionSnapshot:
    version: "integer"
    changedBy: "string"
    note: "string"
    approved: "boolean"
- struct.PerformanceItem:
    id: "integer"
    sku: "string"
    title: "string"
    category: "string"
    priceCents: "integer"
    available: "boolean"
    warehouse: "struct.WarehouseSnapshot"
    analytics: "struct.AnalyticsSnapshot"
    tags: ["string"]
    revisions: ["struct.RevisionSnapshot"]
- fn.getCatalog:
    profile: "string"
  ->:
    - Ok_:
        summary: "struct.PerformanceSummary"
        generatedAt: "string"
        items: ["struct.PerformanceItem"]
