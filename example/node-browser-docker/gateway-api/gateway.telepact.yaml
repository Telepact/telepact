- union.Auth_:
    - Session:
        sessionToken: string
- struct.Viewer:
    id: string
    name: string
    plan: string
    avatar: bytes
- struct.OrderSummary:
    id: string
    status: string
    totalCents: integer
- struct.OrderDetails:
    id: string
    status: string
    totalCents: integer
    shippingEta: string
    receipt: bytes
- fn.getDashboard: {}
  ->:
    - Ok_:
        viewer: struct.Viewer
        orders: [struct.OrderSummary]
        firstOrderDetails!: fn.getOrderDetails
- fn.getOrderDetails:
    orderId: string
  ->:
    - Ok_:
        order: struct.OrderDetails
