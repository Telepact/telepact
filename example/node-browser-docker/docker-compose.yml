services:
  catalog:
    build:
      context: .
      dockerfile: Dockerfile.catalog
    ports:
      - '8081:8081'
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    environment:
      CATALOG_BASE_URL: http://catalog:8081
    depends_on:
      - catalog
    ports:
      - '8080:8080'
