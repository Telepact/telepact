version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/bind/dart"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "00:00"
      timezone: "UTC"
    labels:
      - "dependabot"
    open-pull-requests-limit: 1
    groups:
      all-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

