      day: "monday"
      time: "05:00"
      timezone: "UTC"
    labels:
      - "dependabot"
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "pip"
