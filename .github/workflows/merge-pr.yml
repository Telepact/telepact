name: merge-pr

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: merge-pr
  cancel-in-progress: false

jobs:
  merge-pr:
    name: merge-pr
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/merge' }}
    runs-on: ubuntu-latest
    environment: bot
    timeout-minutes: 30
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TELEPACT_BOT_APP_ID }}
          private-key: ${{ secrets.TELEPACT_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENTER_LOGIN: ${{ github.event.comment.user.login }}

      - name: Configure git identity
        run: |
          git config --global user.name "telepact-notary[bot]"
          git config --global user.email "telepact-notary[bot]@users.noreply.github.com"
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENTER_LOGIN: ${{ github.event.comment.user.login }}

      - name: Merge PR
        run: ./tool/telepact-project merge-pr
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          COMMENTER_LOGIN: ${{ github.event.comment.user.login }}
