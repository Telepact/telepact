name: merge-pr

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read

concurrency:
  group: merge-pr
  cancel-in-progress: false

jobs:
  merge-pr:
    if: ${{ github.event.issue.pull_request != null && github.event.comment.body == '/merge' }}
    runs-on: ubuntu-latest
    environment: bot
    timeout-minutes: 60
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TELEPACT_BOT_APP_ID }}
          private-key: ${{ secrets.TELEPACT_BOT_PRIVATE_KEY }}

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: refs/pull/${{ github.event.issue.number }}/head
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Verify merge conditions
        id: verify-merge
        env:
          COMMENTER_LOGIN: ${{ github.event.comment.user.login }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: ./tool/telepact-project verify-merge-conditions --github-output "$GITHUB_OUTPUT"

      - name: Tidy PR
        id: tidy-pr
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: ./tool/telepact-project tidy-pr --expected-head-sha "${{ steps.verify-merge.outputs.head_sha }}" --github-output "$GITHUB_OUTPUT"

      - name: Verify initial PR requirements
        id: verify-initial
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: ./tool/telepact-project verify-pr-requirements --expected-head-sha "${{ steps.tidy-pr.outputs.head_sha }}" --github-output "$GITHUB_OUTPUT"

      - name: Refresh PR checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: refs/pull/${{ github.event.issue.number }}/head
          token: ${{ steps.generate-token.outputs.token }}

      - name: Bump version
        id: bump
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: ./tool/telepact-project bump --expected-head-sha "${{ steps.verify-initial.outputs.head_sha }}" --github-output "$GITHUB_OUTPUT"

      - name: Verify final PR requirements
        id: verify-final
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: ./tool/telepact-project verify-pr-requirements --expected-head-sha "${{ steps.bump.outputs.head_sha }}" --github-output "$GITHUB_OUTPUT"

      - name: Merge PR
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: ./tool/telepact-project merge-pr --expected-head-sha "${{ steps.verify-final.outputs.head_sha }}"
