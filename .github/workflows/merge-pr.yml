name: merge-pr

on:
  issue_comment:
    types:
      - created

concurrency:
  group: merge-pr
  cancel-in-progress: false

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  merge-pr:
    name: Merge PR
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/merge' }}
    runs-on: ubuntu-latest
    environment: bot
    timeout-minutes: 15
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TELEPACT_BOT_APP_ID }}
          private-key: ${{ secrets.TELEPACT_BOT_PRIVATE_KEY }}

      - name: Checkout trusted repository code
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set up Node.js
        env:
          NODE_VERSION_FILE: .nvmrc
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Set up Dart
        env:
          DART_SDK_VERSION: "3.6"
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.6

      - name: Install uv
        env:
          UV_NO_SYNC: "1"
        uses: astral-sh/setup-uv@v6

      - name: Merge PR
        env:
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: ./tool/telepact-project merge-pr
