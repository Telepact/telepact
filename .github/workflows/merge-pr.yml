name: merge-pr

on:
  issue_comment:
    types:
      - created

concurrency:
  group: merge-pr
  cancel-in-progress: false

jobs:
  merge-pr:
    name: Merge PR
    if: github.event.issue.pull_request != null && github.event.comment.body == '/merge'
    runs-on: ubuntu-latest
    environment: bot
    permissions:
      contents: read
    env:
      GITHUB_REPOSITORY: ${{ github.repository }}
      MERGE_COMMENTER: ${{ github.event.comment.user.login }}
      PR_NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TELEPACT_BOT_APP_ID }}
          private-key: ${{ secrets.TELEPACT_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Merge pull request
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: ./tool/telepact-project merge-pr
