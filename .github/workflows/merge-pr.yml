name: Merge PR

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: merge-pr
  cancel-in-progress: false

jobs:
  merge-pr:
    if: github.event.issue.pull_request != null && github.event.comment.body == '/merge'
    runs-on: ubuntu-latest
    environment: bot
    timeout-minutes: 20
    steps:
      - name: Generate GitHub App token
        id: generate-token
        env:
          TELEPACT_BOT_APP_ID: ${{ vars.TELEPACT_BOT_APP_ID }}
          TELEPACT_BOT_PRIVATE_KEY: ${{ secrets.TELEPACT_BOT_PRIVATE_KEY }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.TELEPACT_BOT_APP_ID }}
          private-key: ${{ env.TELEPACT_BOT_PRIVATE_KEY }}

      - name: Checkout code
        env:
          TELEPACT_GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ env.TELEPACT_GITHUB_TOKEN }}

      - name: Set up Node.js
        env:
          NODE_VERSION_FILE: .nvmrc
        uses: actions/setup-node@v5
        with:
          node-version-file: ${{ env.NODE_VERSION_FILE }}

      - name: Set up Dart
        env:
          DART_SDK_VERSION: "3.6"
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_SDK_VERSION }}

      - name: Install uv
        env:
          UV_NO_PROGRESS: "1"
        uses: astral-sh/setup-uv@v6

      - name: Merge PR
        env:
          COMMENTER_LOGIN: ${{ github.event.comment.user.login }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: ./tool/telepact-project merge-pr
