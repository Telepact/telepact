name: Release

on:
  push:
    branches:
      - main

jobs:
  should-release:
    name: Check release trigger
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check pushed commits for version changes
        id: check
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$BASE_SHA" = '0000000000000000000000000000000000000000' ]; then
            BASE_SHA="$(git rev-list --max-parents=0 "$HEAD_SHA")"
          fi
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -Fxq 'VERSION.txt'; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build-release:
    name: Build release
    needs: [should-release]
    uses: ./.github/workflows/build.yml
    
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    environment: bot
    needs: [should-release, build-release]
    if: ${{ needs.should-release.outputs.should_release == 'true' }}
    timeout-minutes: 2
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TELEPACT_BOT_APP_ID }}
          private-key: ${{ secrets.TELEPACT_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ steps.generate-token.outputs.token }}

      - name: Download ts artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-ts-tgz
          path: lib/ts/dist-tgz

      - name: Download java artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-java
          path: lib/java/target

      - name: Download py artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-py
          path: lib/py/dist

      - name: Download dart artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dart
          path: bind/dart/dist

      - name: Download cli artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-cli
          path: sdk/cli/dist

      - name: Download cli-docker artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-cli-docker
          path: sdk/cli/dist-docker

      - name: Download prettier artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-prettier-tgz
          path: sdk/prettier/dist-tgz

      - name: Download console-docker artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-console-docker
          path: sdk/console/dist-docker

      - name: Download console-tgz artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-console-tgz
          path: sdk/console/dist-tgz

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cut release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./tool/telepact-project release
