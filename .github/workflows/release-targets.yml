name: Release Targets

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to evaluate for release target computation
        required: false
        default: main
        type: string

permissions:
  contents: read

jobs:
  print-release-targets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Print release target manifest
        run: ./tool/telepact-project print-release-manifest --ref HEAD
