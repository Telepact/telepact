name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            bind/dart/package-lock.json
            lib/ts/package-lock.json
            sdk/console/package-lock.json
            sdk/prettier/package-lock.json
            test/console-self-hosted/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: corretto

      - name: Refresh Java truststore from OS CA store
        run: |
          sudo apt-get update
          sudo apt-get install -y --reinstall ca-certificates ca-certificates-java
          sudo update-ca-certificates
          sudo dpkg-reconfigure -f noninteractive ca-certificates-java
          echo 'JAVA_TOOL_OPTIONS=-Djavax.net.ssl.trustStore=/etc/ssl/certs/java/cacerts -Djavax.net.ssl.trustStoreType=JKS' >> "${GITHUB_ENV}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build Telepact CLI and expose repo tools
        run: |
          make cli
          echo "${GITHUB_WORKSPACE}/tool" >> "${GITHUB_PATH}"

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6"

      - name: Install repo prerequisites
        run: |
          sudo apt-get install -y nats-server
