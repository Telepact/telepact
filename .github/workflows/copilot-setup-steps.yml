name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            bind/dart/package-lock.json
            lib/ts/package-lock.json
            sdk/console/package-lock.json
            sdk/prettier/package-lock.json
            test/console-self-hosted/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: corretto

      - name: Trust Maven Central proxy root in Java
        shell: bash
        run: |
          set -euo pipefail
          maven_host=repo.maven.apache.org
          cert_file=/tmp/repo-maven-proxy-root.pem
          openssl_dump=/tmp/repo-maven-openssl-chain.pem
          openssl_err=/tmp/repo-maven-openssl.err
          cert_dir=/tmp/repo-maven-chain-certs
          cacerts_password="${JAVA_CACERTS_PASSWORD:-changeit}"
          keystore_path="${JAVA_HOME}/lib/security/cacerts"
          if ! echo | openssl s_client -showcerts -servername "${maven_host}" -connect "${maven_host}:443" > "${openssl_dump}" 2>"${openssl_err}"; then
            cat "${openssl_err}"
            exit 1
          fi
          rm -rf "${cert_dir}"
          mkdir -p "${cert_dir}"
          awk -v dir="${cert_dir}" '
            /BEGIN CERTIFICATE/ { n++; file=sprintf("%s/cert-%d.pem", dir, n) }
            file != "" { print > file }
            /END CERTIFICATE/ { close(file); file="" }
          ' "${openssl_dump}"
          rm -f "${cert_file}"
          for f in "${cert_dir}"/cert-*.pem; do
            [ -f "${f}" ] || continue
            subject="$(openssl x509 -in "${f}" -noout -subject)"
            issuer="$(openssl x509 -in "${f}" -noout -issuer)"
            if [ "${subject#subject=}" = "${issuer#issuer=}" ]; then
              cp "${f}" "${cert_file}"
              break
            fi
          done
          if [ ! -s "${cert_file}" ]; then
            echo "Failed to find a self-signed root certificate in ${maven_host} TLS chain."
            cat "${openssl_err}"
            exit 1
          fi
          if sudo keytool -list -alias copilot-maven-proxy-root -keystore "${keystore_path}" -storepass "${cacerts_password}" >/dev/null 2>&1; then
            sudo keytool -delete -alias copilot-maven-proxy-root -keystore "${keystore_path}" -storepass "${cacerts_password}"
          fi
          sudo keytool -importcert -noprompt -trustcacerts -alias copilot-maven-proxy-root -file "${cert_file}" -keystore "${keystore_path}" -storepass "${cacerts_password}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Telepact CLI
        run: |
          make cli
          make install-cli
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6"

      - name: Install repo prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates ca-certificates-java nats-server
          sudo update-ca-certificates
          if [ -x /var/lib/dpkg/info/ca-certificates-java.postinst ]; then
            sudo /var/lib/dpkg/info/ca-certificates-java.postinst configure
          fi
