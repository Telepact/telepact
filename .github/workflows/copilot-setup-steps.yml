name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            bind/dart/package-lock.json
            lib/ts/package-lock.json
            sdk/console/package-lock.json
            sdk/prettier/package-lock.json
            test/console-self-hosted/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: corretto

      - name: Trust Maven Central proxy root in Java
        shell: bash
        run: |
          set -euo pipefail
          cert_file=/tmp/repo-maven-proxy-root.pem
          openssl_dump=/tmp/repo-maven-openssl-chain.pem
          cacerts_password="${JAVA_CACERTS_PASSWORD:-changeit}"
          echo | openssl s_client -showcerts -servername repo.maven.apache.org -connect repo.maven.apache.org:443 > "${openssl_dump}" 2>&1
          awk '/BEGIN CERTIFICATE/{n++} n==2{print} /END CERTIFICATE/{if(n==2) exit}' "${openssl_dump}" > "${cert_file}"
          if [ ! -s "${cert_file}" ]; then
            echo "Failed to extract proxy root certificate from repo.maven.apache.org TLS chain."
            exit 1
          fi
          sudo keytool -delete -alias copilot-maven-proxy-root -keystore "${JAVA_HOME}/lib/security/cacerts" -storepass "${cacerts_password}" >/dev/null 2>&1 || true
          sudo keytool -importcert -noprompt -trustcacerts -alias copilot-maven-proxy-root -file "${cert_file}" -keystore "${JAVA_HOME}/lib/security/cacerts" -storepass "${cacerts_password}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Telepact CLI
        run: |
          make cli
          make install-cli
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6"

      - name: Install repo prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates ca-certificates-java nats-server
          sudo update-ca-certificates
          if [ -x /var/lib/dpkg/info/ca-certificates-java.postinst ]; then
            sudo /var/lib/dpkg/info/ca-certificates-java.postinst configure
          fi
