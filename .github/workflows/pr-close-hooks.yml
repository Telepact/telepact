name: PR Close Hooks

on:
  workflow_run:
    types: [completed]
    workflows: ["PR Close Report"]

permissions:
  actions: read
  contents: read

jobs:
  get-pr-close-info:
    name: Get PR Close Information
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      pr_merged: ${{ steps.extract-pr-close-details.outputs.pr_merged }}
      pr_head_ref: ${{ steps.extract-pr-close-details.outputs.pr_head_ref }}
    steps:
      - name: Download PR Close details
        uses: actions/download-artifact@v4
        with:
          name: pr-close-details
          path: pr-close
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Extract PR Close details
        id: extract-pr-close-details
        run: |
          pr_close_details=$(cat pr-close/details.json)
          pr_merged=$(echo "$pr_close_details" | jq -r '.pr_merged')
          pr_head_ref=$(echo "$pr_close_details" | jq -r '.pr_head_ref')

          echo "pr_merged=$pr_merged" >> "$GITHUB_OUTPUT"
          echo "pr_head_ref=$pr_head_ref" >> "$GITHUB_OUTPUT"

  bump-version:
    if: needs.get-pr-close-info.outputs.pr_merged == 'true' && needs.get-pr-close-info.outputs.pr_head_ref != 'bump-version'
    needs: [get-pr-close-info]
    runs-on: ubuntu-latest
    environment: bot
    timeout-minutes: 2
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TELEPACT_BOT_APP_ID }}
          private-key: ${{ secrets.TELEPACT_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.generate-token.outputs.token }}

      # Required for bumping lock files
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.6

      # Required for bumping lock files
      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Configure git identity
        run: |
          git config --global user.name "telepact-notary[bot]"
          git config --global user.email "telepact-notary[bot]@users.noreply.github.com"

      - name: git status
        run: git status

      - name: Check for in-flight bump-version branch
        id: check-bump-branch
        run: |
          if git ls-remote --exit-code --heads origin bump-version >/dev/null 2>&1; then
            echo "bump_branch_exists=true" >> "$GITHUB_OUTPUT"
            echo "A bump-version branch already exists remotely. Skipping."
          else
            echo "bump_branch_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check whether HEAD already changed VERSION.txt
        id: check-version-file
        run: |
          if git show --name-only --pretty="" HEAD | grep -qx "VERSION.txt"; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "VERSION.txt already changed in HEAD. Skipping bump-version PR creation."
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.check-bump-branch.outputs.bump_branch_exists != 'true' && steps.check-version-file.outputs.version_changed != 'true'
        run: ./tool/telepact-project bump

      - name: Create bump-version branch
        if: steps.check-bump-branch.outputs.bump_branch_exists != 'true' && steps.check-version-file.outputs.version_changed != 'true'
        run: |
          git switch -c bump-version
          git push origin HEAD:bump-version

      - name: Open bump-version PR
        if: steps.check-bump-branch.outputs.bump_branch_exists != 'true' && steps.check-version-file.outputs.version_changed != 'true'
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./tool/telepact-project create-pull-request --title "$(git log -1 --format=%s)" --body "$(git log -1 --format=%b)" --head bump-version --base main --no-draft --no-maintainer-can-modify

      - name: git log
        if: steps.check-bump-branch.outputs.bump_branch_exists != 'true' && steps.check-version-file.outputs.version_changed != 'true'
        run: git log -n 1
