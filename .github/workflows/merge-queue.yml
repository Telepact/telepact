name: Merge Queue

on:
  issue_comment:
    types:
      - created

permissions: {}

concurrency:
  group: merge-queue
  cancel-in-progress: false

jobs:
  auto-merge:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/merge' }}
    runs-on: ubuntu-latest
    environment: bot
    timeout-minutes: 40
    env:
      WORKTREE_DIR: /tmp/merge-target-${{ github.run_id }}-${{ github.run_attempt }}-${{ github.event.issue.number }}
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TELEPACT_BOT_APP_ID }}
          private-key: ${{ secrets.TELEPACT_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Configure git identity
        run: |
          git config --global user.name "telepact-notary[bot]"
          git config --global user.email "telepact-notary[bot]@users.noreply.github.com"

      # Required when bumping lock files that are regenerated from Dart package metadata.
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.6

      # Required when bumping lock files that are regenerated from Python package metadata.
      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Ensure PR requirements are met
        id: pr
        env:
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          COMMENT_AUTHOR_LOGIN: ${{ github.event.comment.user.login }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: ./tool/telepact-project ensure-pr-requirements-met --github-output "$GITHUB_OUTPUT"

      - name: Wait for passing PR build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: ./tool/telepact-project check-passing-build --head-sha "${{ steps.pr.outputs.head_sha }}"

      - name: Prepare PR worktree
        env:
          PR_HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          rm -rf "$WORKTREE_DIR"
          git fetch origin "$PR_HEAD_REF"
          git worktree add --force "$WORKTREE_DIR" "origin/$PR_HEAD_REF"

      - name: Apply version bump
        id: bump
        env:
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          cd "$WORKTREE_DIR"
          ../tool/telepact-project bump
          echo "version=$(cat VERSION.txt)" >> "$GITHUB_OUTPUT"

      - name: Commit and push bump
        env:
          PR_HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          cd "$WORKTREE_DIR"
          git add .
          git commit -m "Bump version to ${{ steps.bump.outputs.version }} (#${PR_NUMBER}) [skip build]"
          git push origin "HEAD:$PR_HEAD_REF"

      - name: Wait for passing PR build after bump
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          cd "$WORKTREE_DIR"
          ../tool/telepact-project check-passing-build --head-sha "$(git rev-parse HEAD)"

      - name: Squash merge PR
        env:
          GH_PROMPT_DISABLED: "1"
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd "$WORKTREE_DIR"
          gh pr merge "${{ github.event.issue.number }}" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --match-head-commit "$(git rev-parse HEAD)"
