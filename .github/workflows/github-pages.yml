name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/github-pages.yml
      - Makefile
      - README.md
      - doc/**
      - example/**
      - common/**
      - lib/**/README.md
      - sdk/**/README.md
      - site/src/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build site
        env:
          TELEPACT_SITE_CUSTOM_DOMAIN: ${{ vars.TELEPACT_SITE_CUSTOM_DOMAIN }}
          TELEPACT_SITE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          TELEPACT_SITE_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: make site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
