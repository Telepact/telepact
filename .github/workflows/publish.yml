name: Publish

on:
  release:
    types:
      - published

jobs:
  resolve-release-plan:
    runs-on: ubuntu-latest
    outputs:
      publish_java: ${{ steps.resolve.outputs.publish_java }}
      publish_ts: ${{ steps.resolve.outputs.publish_ts }}
      publish_py: ${{ steps.resolve.outputs.publish_py }}
      publish_go: ${{ steps.resolve.outputs.publish_go }}
      publish_cli: ${{ steps.resolve.outputs.publish_cli }}
      publish_console: ${{ steps.resolve.outputs.publish_console }}
      publish_prettier: ${{ steps.resolve.outputs.publish_prettier }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Resolve release manifest
        id: resolve
        run: |
          ./tool/telepact-project publish-targets \
            --release-tag "${{ github.event.release.tag_name }}" \
            --release-body "${{ github.event.release.body }}" \
            --github-output "$GITHUB_OUTPUT"

  publish-java:
    runs-on: ubuntu-latest
    environment: publish
    needs: [resolve-release-plan]
    if: ${{ needs.resolve-release-plan.outputs.publish_java == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"

      - name: Configure GPG
        run: echo "${{ secrets.MVN_GPG_PRIVATE_KEY }}" | gpg --batch --import --yes

      - name: Upload to Maven Central
        env:
          GPG_PASSPHRASE: ${{ secrets.MVN_GPG_PASSPHRASE }}
          CENTRAL_USERNAME: ${{ secrets.MVN_CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.MVN_CENTRAL_TOKEN }}
        run: make deploy-java

  publish-ts:
    runs-on: ubuntu-latest
    environment: publish
    needs: [resolve-release-plan]
    if: ${{ needs.resolve-release-plan.outputs.publish_ts == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org/"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_INSTALL: ci --ignore-scripts
        run: make deploy-ts

  publish-py:
    runs-on: ubuntu-latest
    environment: publish
    needs: [resolve-release-plan]
    if: ${{ needs.resolve-release-plan.outputs.publish_py == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: make deploy-py

  publish-go:
    runs-on: ubuntu-latest
    environment: publish
    needs: [resolve-release-plan]
    if: ${{ needs.resolve-release-plan.outputs.publish_go == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Publish to Go proxy
        run: make deploy-go

  publish-cli:
    runs-on: ubuntu-latest
    environment: publish
    needs: [resolve-release-plan]
    if: ${{ needs.resolve-release-plan.outputs.publish_cli == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: make deploy-cli

  publish-console:
    runs-on: ubuntu-latest
    environment: publish
    needs: [resolve-release-plan]
    if: ${{ needs.resolve-release-plan.outputs.publish_console == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org/"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_INSTALL: ci --ignore-scripts
        run: make deploy-console

  publish-prettier:
    runs-on: ubuntu-latest
    environment: publish
    needs: [resolve-release-plan]
    if: ${{ needs.resolve-release-plan.outputs.publish_prettier == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org/"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_INSTALL: ci --ignore-scripts
        run: make deploy-prettier
