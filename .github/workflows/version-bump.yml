name: version-bump

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  open-version-bump-pr:
    name: open-version-bump-pr
    runs-on: ubuntu-latest
    environment: bot
    timeout-minutes: 15
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TELEPACT_BOT_APP_ID }}
          private-key: ${{ secrets.TELEPACT_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.6

      - name: Configure git identity
        run: |
          git config user.name "telepact-notary[bot]"
          git config user.email "204597530+telepact-notary[bot]@users.noreply.github.com"

      - name: Open version bump PR
        run: ./tool/telepact-project open-version-bump-pr
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
