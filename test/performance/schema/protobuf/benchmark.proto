syntax = "proto3";

package telepact.performance;
option java_package = "io.github.telepact.performance.proto";
option java_outer_classname = "BenchmarkProto";

message TypicalItem {
  string primaryId = 1;
  string secondaryId = 2;
  int32 count = 3;
  double ratio = 4;
}

message StringItem {
  string alpha = 1;
  string beta = 2;
  string gamma = 3;
  string delta = 4;
}

message NumberItem {
  int32 left = 1;
  int32 right = 2;
  double ratio = 3;
  double offset = 4;
}

message TypicalList {
  repeated TypicalItem items = 1;
}

message StringList {
  repeated StringItem items = 1;
}

message NumberList {
  repeated NumberItem items = 1;
}

message Payload {
  oneof value {
    TypicalItem typicalSingle = 1;
    TypicalList typicalList = 2;
    StringItem stringSingle = 3;
    StringList stringList = 4;
    NumberItem numberSingle = 5;
    NumberList numberList = 6;
  }
}

message RoundTripRequest {
  Payload payload = 1;
}

message RoundTripResponse {
  Payload payload = 1;
}
