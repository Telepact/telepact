force_all_if_changed:
  - .release/force-all.md

projects:
  java:
    paths:
      - lib/java
  py:
    paths:
      - lib/py
    is_dependency_for:
      - cli
  ts:
    paths:
      - lib/ts
    is_dependency_for:
      - dart
      - console
  go:
    paths:
      - lib/go
  dart:
    paths:
      - bind/dart
  cli:
    paths:
      - sdk/cli
  console:
    paths:
      - sdk/console
  prettier:
    paths:
      - sdk/prettier
    is_dependency_for:
      - console
